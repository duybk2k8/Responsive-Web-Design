<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donation Form</title>
</head>
<body>
  <h1>Donation Form</h1>
  <form>
    
    <label for="name">Full Name:</label>
    <input required type="text" name="name" id="name">

    <label for="mail">Email Address:</label>
    <input required type="email" name="email" id="mail">

    <label for="da">Donation Amount ($):</label>
    <input required type="number" name="amount" id="da">

    <label for="newsletter">Subscribe</label>
    <input type="checkbox" name="newsletter" id="newsletter">
    
    <input type="submit" value="Send" id="sub"> <!--submit dont need label because value already exist-->
  </form>
</body>
</html>
