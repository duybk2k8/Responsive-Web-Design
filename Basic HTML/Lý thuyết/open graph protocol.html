<!--open graph protocol là đường link dẫn ngoài web khi gửi mes hay ig nó sẽ hiện lên đẹp chứ k chỉ link-->

<!--Cách 1: dùng title-->
<meta content="freeCodeCamp.org" property="og:title" />
<!--để open graph(OG) là title-->

<!--Cách 2: dùng type-->
<meta property="og:type" content="website" />
<!--type là thể loại nội dung trong link là gì, ví dụ: website, article, book, profile-->
<meta
  content="https://cdn.freecodecamp.org/platform/universal/fcc_meta_1920X1080-indigo.png"
  property="og:image"
/>

<!--Cách 3: dùng các thể loại kiểu url-->
<!--nó sẽ lấy ảnh đại diện của fcc-->
<meta property="og:url" content="https://www.freecodecamp.org"/>
<!--còn nhiều thể loại k chỉ url:
description, audio, video, local
MOST IMPORTANT: url, image, type, title (được dùng chung)
-->
