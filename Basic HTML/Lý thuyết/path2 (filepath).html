<!--single dot (.)
===> current directory
==> ensure the path is a relative path (Đại diện cho thư mục hiện tại VD: ./pages/about.html)
two dots (..) ==> parent directory => tiếp cận đến file ngoài file hiện tại

VD:
my-app/
    ==> public/
        +) favicon.ico
        +) index.html
    ==> src/
        +) index.css
        +) index.js

Đang ở public/index.html
=> muốn đến favicon.ico => đang ở vị trí đấy => dùng "." => relative path => ./favicon.ico
=> muốn đến index.css => khác file ==> phải dùng ".." để về parent my-app => xong src => ../src/index.css
-->
