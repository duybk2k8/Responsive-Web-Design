<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
       name="viewport"
       content="width=device-width, initial-scale=1.0" />
    <title>freeCodeCamp</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <h1>Welcome to freeCodeCamp</h1>
    <p>
      We are a nonprofit organization that helps people learn to code for free.
    </p>
  </body>
</html>
<!-- đây là 1 câu trúc có sẵn giúp tiến kiệm thời gian -->
<!--!DOCTYPE html trình báo đây là html -->
<!--giữa các head là thông tin về trang web, body là hết nội dung của trang web -->
<!--meta là thẻ HTML dùng để cung cấp thông tin về tài liệu HTML, thường được sử dụng để xác định charset, viewport, description, keywords, author, v.v. -->

<!--charset là thuộc tính của thẻ meta, chỉ định bộ mã hóa ký tự được sử dụng trong tài liệu HTML. UTF-8 là một bộ mã hóa phổ biến hỗ trợ hầu hết các ký tự trên thế giới. -->
<!--utf-8 là character encoding, là giúp máy đọc được ký tự, dịch ra thành số và lưu trữ trong máy tính, khi hiển thị -->
<!--để charset = utf-8 vừa giúp hiển thị nhiều và đúng, vừa để máy lưu trữ và xử lý dữ liệu đúng, tránh lỗi hiển thị ký tự đặc biệt -->
