<!--Absolute path
Complete link to a resource
Starts from the root directory => filename + extension
root directory ==> top-level directory or folder in a hierarchy
====> complete address (chỉ chính xác tài nguyên của gốc) => include protocal (https) + domain name
Example:
-->
<p>
  Read more on the
  <a
    href="/Users/user/Desktop/fCC/script-code/absolute-vs-relative-paths/pages/about.html"
    >About Page</a
    >
</p>
<!--complete address-->
<a href="https://design-style-guide.freecodecamp.org/img/fcc_secondary_small.svg">
  View fCC Logo
</a>

specify the location of relative to the directory of current file
