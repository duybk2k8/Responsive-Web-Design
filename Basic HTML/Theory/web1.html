<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!--viewport là khung hình, giúp điều chỉnh lại khung hình sao cho khớp với kích thức-->
  <!--content của trang web trên các thiết bị khác nhau, với width là bằng với chiều rộng của thiết bị-->
  <!--initial-scale là tỷ lệ phóng đại ban đầu khi trang web được tải lên.-->
</head>
<body>
  <img src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/cats.jpg" alt="Two tabby kittens sleeping together on a couch." />
</body>

<!--attribute là thuộc tính của thẻ HTML, giúp cung cấp thông tin bổ sung về phần tử HTML. -->
<!--Trong ví dụ trên, "src" là một attribute của thẻ <img> để chỉ định đường dẫn đến hình ảnh-->
<!--"alt" là một attribute để cung cấp văn bản thay thế cho hình ảnh khi hình ảnh không thể hiển thị.-->

<a href="https://www.freecodecamp.org/news/" target="_blank">Visit freeCodeCamp</a>
<!--a ở đây là anchor, là thẻ HTML dùng để tạo liên kết đến một trang web khác.-->
<!--attribute "href" chỉ định đường dẫn đến trang web được liên kết-->
<!--attribute "target" với giá trị "_blank" giúp mở liên kết trong tab mới-->
<!-- để đóng thẻ mở của anchor, và "Visit freeCodeCamp" là văn bản hiển thị cho liên kết.-->
<!--href là dùng để đưa ng dùng đến web khác, còn src là đưa tài nguyên đến web của mình-->


<input type="checkbox" checked />
<!--interactive element là phần tử HTML có thể tương tác với người dùng, ví dụ như checkbox, radio button, input field, button, v.v.-->

<input type="text" disabled>
<!--disabled attribute là một thuộc tính của thẻ HTML, khi được áp dụng sẽ làm cho phần tử trở nên không thể tương tác hoặc chỉnh sửa được. 
==>boolean-->
<!--Trong ví dụ trên, input field sẽ bị vô hiệu hóa và người dùng không thể nhập dữ liệu vào đó.-->
