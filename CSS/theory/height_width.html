<!--nếu k set width ==> auto
Các đơn vị thường gặp: pixels (px), percentages (%), viewport units (vw, vh)-->

<head>
    <style>
        .box {
            width: 50px;
            min-width: 100px;
            max-width: 150px;
            height: 50px;
            min-height: 100px;
            max-height: 150px;
            background-color: skyblue
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>

<!--min-width: minimum width it can get
==> in this example it will set to 100px-->
<!--max-width: if max-width < width ==> set to max-width-->
