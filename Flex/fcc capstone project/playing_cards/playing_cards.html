<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link href="playing_cards.css" rel="stylesheet">
</head>

<body>
  <main id="playing-cards">
    <div class="card">
      <div class="left">A</div>
      <div class="middle">♠</div>
      <div class="right">A</div>
    </div>

    <div class="card">
      <div class="left">
        <span>2</span>
        <span>♣</span>
      </div>
      <div class="middle">
        <span>♣</span>
        <span class="second">♣</span>
      </div>
      <div class="right">
        <span>♣</span>
        <span>2</span> <!--flex sẽ sắp xếp theo các phần tử con trong class-->
      </div>
    </div>

    <div class="card heart">
      <div class="left ">
        <span>3</span>
        <span>♥</span>
      </div>
      <div class="middle">
        <span>♥</span>
        <span>♥</span>
        <span class="second">♥</span>
      </div>
      <div class="right">
        <span>♥</span>
        <span>3</span> <!--flex sẽ sắp xếp theo các phần tử con trong class-->
      </div>
    </div>

    <div class="card">
      <div class="left">
        <span>4</span>
        <span>♣</span>
      </div>
      <div class="middle">
        <span>♣♣</span>
        <span class="second">♣♣</span>
      </div>
      <div class="right">
        <span>♣</span>
        <span>4</span> <!--flex sẽ sắp xếp theo các phần tử con trong class-->
      </div>
    </div>
  </main>
</body>

</html>
