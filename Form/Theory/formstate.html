<!--form states: focused, readonly, disabled-->
<!--DEFAULT STATE
=> blank input-->
<input id="email" name="email" type="email" />
<!--type bảo web là đây là ô để điền mail
name là khi gửi thì nó sẽ lên hệ thống, xác định kiểu
id là chứng minh thư, biết nó là gì, liên kết với CSS-->

<!--FOCUS STATE
=> bấm tab-->

<!--DISABLED STATE
=> input cannot be focused or activated-->
<input disabled type="email" id="email" name="email"/>

<!--READONLY STATE
=> can focus, submit other but cannot edit-->
<input
  readonly
  type="email"
  name="email"
  id="email"
  value="example@email.com"
/>
