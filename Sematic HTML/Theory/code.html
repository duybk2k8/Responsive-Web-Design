<!--want to represent short snippets of code inside text-->
<p>
    To set the text color to blue in CSS, use the following code:
    <code>color: blue;</code>
</p>

<pre>
    <!--preformatted text => được định dạng sẵn => viết y hệt mình viết-->
    <code>
    body {
        color: red;
    }</code>
</pre>

<!--short code ==> <code>
    long ==> <pre> + <code>-->
