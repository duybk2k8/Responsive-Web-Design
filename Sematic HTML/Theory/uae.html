<!--unarticulated annotation element means that you want to underline sth has speciality compared to other
but NO emphasize-->
<!--note spelling inaccuracy-->
<!--want to style underline ==> CSS-->
<p>
  You can use the unarticulated annotation element to highlight
  <u>inccccort</u> <u>spling</u> <u>issses</u>.
</p>

<!--strikethrough element
==> represent the text is no longer accurate or relevant (gạch thẳng giữa)-->
<p><s>Tomorrow's hike will be meeting at noon.</s></p>

<p>Due to unforeseen weather conditions, the hike has been canceled.</p>

<!--ruby is use to represent small text shown above / below ==> East Asian characters-->
<ruby> 明日 <rp>(</rp><rt>Ashita</rt><rp>)</rp> </ruby>
<!--rp => ruby fallback parenthesis => phương án dự phòng (if old browser cannot recognize ruby and rt => 2 words will not be sticked) 
rt ==> thẻ chứa phiên âm nhỏ (word above)-->
<!--có 2 cái rp là cho 2 dấu ngoặc
có nghĩa là nếu nó k đẩy lên trên dc, nó sẽ tự trở thành dấu ngoặc (漢(kan))-->>
