<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Contact Form</title>
    <link rel="stylesheet" href="contact_form.css">
</head>

<body>
    <div class="form-container">
        <form>
            <h2>🌟Contact Information🌟</h2>
            <label for="name">
                Name: 
                <input placeholder="Bui Khanh Duy" type="text" id="name" name="name"
                required/>
            </label>

            <label for="email">
                Email: 
                <input placeholder="abc@gmail.com" type="email" id="email" name="email"
                required/>
            </label>

            <label for="mes">
                Message: 
                <textarea  placeholder="I want to report..." id="mes" name="mes"
                required></textarea>
            </label>

            <button type="submit"
            >Submit</button>
        </form>
    </div>
</body>

</html>
